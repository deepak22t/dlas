[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Dummy value.
# Actual database URL env.py se load hogi.
sqlalchemy.url = sqlite:///dummy.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)s: %(message)s